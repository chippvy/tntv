<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trương Nguyễn Trường Vy · Hiệu ứng nhấp nháy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mượt khi chạm */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0b1120, #03070f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Poppins', 'Montserrat', sans-serif;
            padding: 20px 16px;
        }

        /* Container dọc - mỗi từ một hàng */
        .vertical-name {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 0;
            position: relative;
        }

        /* Mỗi dòng là 1 từ, nhưng bên trong là các span để có hiệu ứng từng chữ */
        .name-row {
            display: flex;
            justify-content: center;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.08rem;
        }

        /* Mỗi ký tự (chữ cái) riêng lẻ - giữ nguyên hiệu ứng nhấp nháy giống bản gốc */
        .char {
            position: relative;
            display: inline-block;
            font-size: clamp(2.5rem, 11vw, 4.8rem);
            font-weight: 800;
            color: #fff;
            animation: waveGlow 1.5s ease-in-out infinite;
            animation-delay: calc(0.05s * var(--i));
            text-shadow: 0 0 5px #00a6ff, 0 0 12px #00e0ff;
            transition: all 0.2s ease;
            letter-spacing: 2px;
            white-space: pre;
        }

        /* Hiệu ứng nhấp nháy + bay lên nhẹ (giống yêu cầu) */
        @keyframes waveGlow {
            0%, 100% {
                transform: translateY(0px);
                text-shadow: 0 0 5px #00a6ff, 0 0 10px #00e0ff;
            }
            50% {
                transform: translateY(-10px);
                text-shadow: 0 0 15px #ff66cc, 0 0 25px #ff44aa, 0 0 35px #ff88ff;
                color: #fff5e0;
            }
        }

        /* Khi chạm/hover vào từng dòng, tăng tốc hiệu ứng hoặc giữ nguyên nhưng thêm vui mắt */
        .name-row:hover .char {
            animation-play-state: running;
            filter: drop-shadow(0 0 6px rgba(0, 255, 255, 0.5));
        }

        /* Điều chỉnh khoảng cách trên mobile */
        @media (max-width: 550px) {
            .vertical-name {
                gap: 0.9rem;
            }
            .char {
                font-size: clamp(2.2rem, 9vw, 3.8rem);
                animation-duration: 1.3s;
            }
        }

        @media (max-width: 380px) {
            .char {
                font-size: clamp(1.8rem, 8vw, 3rem);
            }
            .vertical-name {
                gap: 0.7rem;
            }
        }

        /* Thêm hiệu ứng xuất hiện mượt cho từng dòng */
        .name-row {
            opacity: 0;
            animation: fadeSlideUp 0.5s ease forwards;
        }
        .name-row:nth-child(1) { animation-delay: 0.05s; }
        .name-row:nth-child(2) { animation-delay: 0.15s; }
        .name-row:nth-child(3) { animation-delay: 0.25s; }
        .name-row:nth-child(4) { animation-delay: 0.35s; }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Dấu trang trí nhẹ đầu cuối */
        .vertical-name::before {
            content: '✨';
            font-size: 1.3rem;
            opacity: 0.6;
            margin-bottom: 6px;
            letter-spacing: 6px;
        }
        .vertical-name::after {
            content: '✨';
            font-size: 1.3rem;
            opacity: 0.6;
            margin-top: 6px;
        }

        html {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="vertical-name">
        <!-- Dòng 1: Trương -->
        <div class="name-row">
            <span class="char" style="--i:1">T</span>
            <span class="char" style="--i:2">r</span>
            <span class="char" style="--i:3">ư</span>
            <span class="char" style="--i:4">ơ</span>
            <span class="char" style="--i:5">n</span>
            <span class="char" style="--i:6">g</span>
        </div>

        <!-- Dòng 2: Nguyễn -->
        <div class="name-row">
            <span class="char" style="--i:1">N</span>
            <span class="char" style="--i:2">g</span>
            <span class="char" style="--i:3">u</span>
            <span class="char" style="--i:4">y</span>
            <span class="char" style="--i:5">ễ</span>
            <span class="char" style="--i:6">n</span>
        </div>

        <!-- Dòng 3: Trường -->
        <div class="name-row">
            <span class="char" style="--i:1">T</span>
            <span class="char" style="--i:2">r</span>
            <span class="char" style="--i:3">ư</span>
            <span class="char" style="--i:4">ờ</span>
            <span class="char" style="--i:5">n</span>
            <span class="char" style="--i:6">g</span>
        </div>

        <!-- Dòng 4: Vy -->
        <div class="name-row">
            <span class="char" style="--i:1">V</span>
            <span class="char" style="--i:2">y</span>
        </div>
    </div>
</body>
</html>
