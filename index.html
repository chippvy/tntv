<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trương Nguyễn Trường Vy · Dọc</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mượt khi chạm */
        }

        body {
            /* nền gradient tinh tế, nhẹ nhàng nhưng hiện đại */
            background: radial-gradient(circle at 20% 30%, #0b1120, #07111f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', 'Poppins', 'Montserrat', sans-serif;
            padding: 24px 16px;
        }

        /* container dọc chính – chiếm toàn bộ chiều cao màn hình nhỏ (điện thoại) */
        .vertical-name {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* mỗi dòng là 1 từ (khối chữ) */
        .name-block {
            display: block;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            width: 100%;
            transition: all 0.2s ease;
        }

        /* hiệu ứng chữ riêng cho từng dòng, giống phong cách lung linh nhưng không rối */
        .name-block span {
            display: inline-block;
            font-size: clamp(2.8rem, 12vw, 5rem);
            background: linear-gradient(135deg, #ffffff, #c0e0ff, #a0d0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 180, 255, 0.5);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* hiệu ứng nhẹ khi chạm / hover (trên mobile vẫn có active) */
        .name-block:active span {
            transform: scale(0.97);
            text-shadow: 0 0 20px #6bc6ff;
        }

        /* riêng dòng "Vy" có thể điểm nhấn nhẹ */
        .name-block:last-child span {
            background: linear-gradient(135deg, #ffdfb8, #ffb8e0, #ff9ed0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px #ff8dd0;
        }

        /* decoration: dấu chấm hoặc đường kẻ mờ giúp căn chỉnh thị giác */
        .vertical-name::before {
            content: '✦';
            font-size: 1.4rem;
            color: rgba(100, 200, 255, 0.4);
            letter-spacing: 4px;
            margin-bottom: 0.2rem;
        }

        .vertical-name::after {
            content: '✦';
            font-size: 1.4rem;
            color: rgba(100, 200, 255, 0.4);
            margin-top: 0.2rem;
        }

        /* tăng khoảng cách giữa các chữ cho dễ nhìn, phù hợp khung dọc */
        @media (max-width: 480px) {
            .vertical-name {
                gap: 0.9rem;
            }
            .name-block span {
                font-size: clamp(2.5rem, 10vw, 4rem);
            }
        }

        /* đảm bảo trên màn hình rất nhỏ vẫn đẹp */
        @media (max-width: 360px) {
            .vertical-name {
                gap: 0.7rem;
            }
        }

        /* thêm hiệu ứng fade-in cho từng dòng khi load */
        .name-block {
            opacity: 0;
            animation: slideUpFade 0.45s ease forwards;
        }

        .name-block:nth-child(1) { animation-delay: 0.05s; }
        .name-block:nth-child(2) { animation-delay: 0.15s; }
        .name-block:nth-child(3) { animation-delay: 0.25s; }
        .name-block:nth-child(4) { animation-delay: 0.35s; }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* tuỳ chọn background mượt hơn, không gây chói */
        html {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="vertical-name">
        <!-- dòng 1: Trương -->
        <div class="name-block">
            <span>Trương</span>
        </div>
        <!-- dòng 2: Nguyễn -->
        <div class="name-block">
            <span>Nguyễn</span>
        </div>
        <!-- dòng 3: Trường -->
        <div class="name-block">
            <span>Trường</span>
        </div>
        <!-- dòng 4: Vy -->
        <div class="name-block">
            <span>Vy</span>
        </div>
    </div>
</body>
</html>
